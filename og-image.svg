<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2185b"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="219" cy="459" r="22" fill="#e91e63" opacity="0.06"/>
    <circle cx="281" cy="476" r="46" fill="#e91e63" opacity="0.08"/>
    <circle cx="256" cy="40" r="78" fill="#e91e63" opacity="0.10"/>
    <circle cx="1162" cy="95" r="68" fill="#e91e63" opacity="0.15"/>
    <circle cx="1152" cy="722" r="23" fill="#e91e63" opacity="0.15"/>
    <circle cx="925" cy="-47" r="22" fill="#e91e63" opacity="0.08"/>
    <rect x="465" y="700" width="95" height="29" rx="8" fill="#c2185b" opacity="0.13" transform="rotate(6, 9, 544)"/>
    <rect x="44" y="305" width="90" height="79" rx="8" fill="#c2185b" opacity="0.08" transform="rotate(27, 661, 470)"/>
    <rect x="666" y="274" width="97" height="58" rx="8" fill="#c2185b" opacity="0.07" transform="rotate(37, 292, 610)"/>
    <rect x="161" y="357" width="27" height="83" rx="8" fill="#c2185b" opacity="0.09" transform="rotate(38, 134, 586)"/>
    <rect x="104" y="571" width="68" height="61" rx="8" fill="#c2185b" opacity="0.13" transform="rotate(33, 356, 30)"/>
    <rect x="543" y="681" width="89" height="39" rx="8" fill="#c2185b" opacity="0.12" transform="rotate(44, 410, 6)"/>
    <rect x="255" y="715" width="57" height="31" rx="8" fill="#c2185b" opacity="0.13" transform="rotate(17, -60, -54)"/>
    <rect x="868" y="581" width="44" height="68" rx="8" fill="#c2185b" opacity="0.13" transform="rotate(3, 924, 487)"/>
    <polygon points="1065,344 1157,528 973,528" fill="#e91e63" opacity="0.12"/>
    <polygon points="715,65 738,111 692,111" fill="#e91e63" opacity="0.10"/>
    <polygon points="728,584 822,772 634,772" fill="#e91e63" opacity="0.10"/>
    <polygon points="1298,418 1355,532 1241,532" fill="#e91e63" opacity="0.06"/>

  <!-- Wave at bottom -->
  <path d="M0,550 C360,590 840,510 1200,550 L1200,630 L0,630Z" fill="#e91e63" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    마포 셔츠룸
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 서버 웜업
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fff3e0" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fff3e0" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 마포 셔츠룸 — 서버 웜업
  </text>
</svg>